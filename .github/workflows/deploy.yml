name: Build & Deploy Sanatan

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Validate SSH access to VPS
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o BatchMode=yes \
              -o ConnectTimeout=10 \
              -i ~/.ssh/id_rsa "$VPS_USER@$VPS_HOST" 'echo SSH connection OK'

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/jaypandeydev/sanatan:latest

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            export GODEBUG=netdns=go
            cd /opt/sanatan
            if [ -d .git ]; then
              git fetch origin main
              git reset --hard origin/main
            fi
            docker pull ghcr.io/jaypandeydev/sanatan:latest
            docker compose -f docker-compose.yml up -d db
            sleep 10
            docker compose -f docker-compose.yml run --rm --no-deps sanatan sh -c "npx prisma migrate deploy && npx prisma generate"
            docker compose -f docker-compose.yml up -d
            docker image prune -f